<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>CAREY｜業務に合わせたオーダーメイドWebアプリ開発</title>
    <meta
      name="description"
      content="CAREYは、紙・Excel・LINE・電話で回している業務を、あなたの事業に合わせたWebアプリに変える開発サービスです。市販アプリでは手が届かない業務に、必要な機能だけを安価に構築。相談・見積り無料。"
    />

    <!-- OGP（⚠️ og:url / og:image は本番ドメイン確定後に差し替え） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CAREY" />
    <meta property="og:title" content="CAREY｜業務に合わせたオーダーメイドWebアプリ開発" />
    <meta
      property="og:description"
      content="紙・Excel・LINE・電話で回している業務を、あなたの事業に合わせたWebアプリに。必要な機能だけを安価に構築。相談・見積り無料。"
    />
    <meta property="og:url" content="https://carey.example.com/" />
    <meta property="og:image" content="https://carey.example.com/ogp.png" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@500;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- 構造化データ（⚠️ url / 所在地は確定後に差し替え） -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "CAREY",
        "description": "紙・Excel・LINE・電話で回している業務を、事業に合わせたWebアプリに変える開発サービス。",
        "url": "https://carey.example.com/",
        "areaServed": "JP",
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "熊本県"
        },
        "priceRange": "¥100,000〜"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
